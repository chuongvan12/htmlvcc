<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MacBook Neo</title>
</head>
<style>

/* ===== Reset ===== */
body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont,"Segoe UI",
                 Roboto, Helvetica, Arial, sans-serif;
    color:#1d1d1f;
    background:#ffffff;
}

/* ===== Giới hạn chiều rộng toàn trang ===== */
table,
#navigation,
.noi-dung-chinh{
    max-width:1000px;   /* 👈 thu nhỏ như Apple */
    margin:0 auto;      /* căn giữa */
}

/* ===== Thanh quốc gia ===== */
table{
    background:#f5f5f7;
    font-size:14px;
    padding:10px 20px;
}

select{
    padding:6px 10px;
    border-radius:6px;
    border:1px solid #ccc;
}

table button{
    background:black;
    color:white;
    border:none;
    padding:7px 14px;
    border-radius:8px;
    margin-left:8px;
    cursor:pointer;
}

/* ===== Navigation ===== */
#navigation{
    padding:12px 0;
    font-size:14px;
    text-align:center;
}

#navigation a{
    margin:0 12px;
    color:#1d1d1f;
    text-decoration:none;
}

#navigation a:hover{
    opacity:0.6;
}

/* ===== Nội dung chính ===== */
.noi-dung-chinh{
    max-width:900px;        /* khung hẹp lại */
    margin:0 auto;
    text-align:center;
    padding:35px 20px 50px;
}

/* ===== Tiêu đề ===== */
.noi-dung-chinh h1{
    font-size:38px;         /* giảm mạnh kích thước */
    font-weight:600;
    letter-spacing:-0.3px;
    margin:0;
}

/* ===== Slogan ===== */
.noi-dung-chinh p{
    font-size:19px;
    color:#6e6e73;
    margin-top:8px;
    margin-bottom:18px;
}

/* ===== Nhóm nút ===== */
.noi-dung-chinh button{
    font-size:14px;
    padding:7px 16px;
    border-radius:20px;
    border:none;
    cursor:pointer;
    margin:3px;
    transition:0.2s;
}

/* Learn more */
.noi-dung-chinh button:first-of-type{
    background:#0071e3;
    color:white;
}

/* Buy */
.noi-dung-chinh button:last-of-type{
    background:white;
    color:#0071e3;
    border:1px solid #0071e3;
}

.noi-dung-chinh button:hover{
    opacity:0.85;
}

/* ===== Hình sản phẩm ===== */
.noi-dung-chinh img{
    width:420px;        /* nhỏ đúng tỉ lệ banner Apple */
    max-width:85%;
    margin-top:22px;
    display:block;
    margin-left:auto;
    margin-right:auto;
}
</style>

<body>

    <!-- Vùng 1: Thanh chọn quốc gia -->
    <table width="100%">
        <tr>
            <td align="left">
                Chọn quốc gia hoặc khu vực khác để xem nội dung dành riêng cho vị trí của bạn và mua sắm trực tuyến.
            </td>

            <td align="right">
                <select>
                    <option>Việt Nam</option>
                    <option>Mỹ</option>
                    <option>Canada</option>
                    <option>Vương quốc Anh</option>
                    <option>Nhật Bản</option>
                    <option>Singapore</option>
                </select>

                <button>Tiếp tục</button>
                ×
            </td>
        </tr>
    </table>

    <hr>

    <!-- Vùng 2: Thanh chức năng -->
<div id="navigation" align="center">

        <a><img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" width="15"> </a> 
        <a>Store</a> 
        <a>Mac</a> 
        <a>iPad</a> 
        <a>iPhone</a> 
        <a>Watch</a> 
        <a>Vision</a> 
        <a>AirPods</a>  
        <a>TV & Home</a> 
        <a>Entertainment</a> 
        <a>Accessories</a> 
        <a>Support</a> 
        <a>🔍</a>
        <a>🛒</a>
    
    </div>

    <hr>

    <!-- Vùng 3: Nội dung chính -->
    <div class="noi-dung-chinh">
        <center>

            <h1>MacBook Neo</h1>

            <p>Amazing Mac. Surprising price.</p>

            <button>Learn more</button>
            <button>Buy</button>

            <br><br>

            <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8" width="400" alt="MacBook">

        </center>
    </div>

</body>
</html>
